version: '3.9'

networks:
  jobnet:
    driver: bridge

volumes:
  pg_auth_data:
  pg_jobs_data:
  redis_data:
  kafka_data:
  zk_data:
  es_data:
  minio_data:
  prometheus_data:
  grafana_data:

services:

  # ── Databases ─────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports: ["5432:5432"]
    volumes: [pg_auth_data:/var/lib/postgresql/data]
    networks: [jobnet]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U auth_user -d auth_db"]
      interval: 10s
      retries: 5

  postgres-jobs:
    image: postgres:16-alpine
    container_name: postgres-jobs
    environment:
      POSTGRES_DB: jobs_db
      POSTGRES_USER: jobs_user
      POSTGRES_PASSWORD: jobs_pass
    ports: ["5433:5432"]
    volumes: [pg_jobs_data:/var/lib/postgresql/data]
    networks: [jobnet]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U jobs_user -d jobs_db"]
      interval: 10s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass redis_pass --appendonly yes
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    networks: [jobnet]
    healthcheck:
      test: ["CMD","redis-cli","-a","redis_pass","ping"]
      interval: 10s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes: [zk_data:/var/lib/zookeeper/data]
    networks: [jobnet]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes: [kafka_data:/var/lib/kafka/data]
    networks: [jobnet]
    healthcheck:
      test: ["CMD","kafka-topics","--bootstrap-server","localhost:29092","--list"]
      interval: 30s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on: [kafka]
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [jobnet]

  # ── Elasticsearch ─────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: [es_data:/usr/share/elasticsearch/data]
    networks: [jobnet]
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    depends_on: [elasticsearch]
    ports: ["5601:5601"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks: [jobnet]

  # ── MinIO ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000","9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]
    networks: [jobnet]

  # ── Tracing ───────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports: ["9411:9411"]
    networks: [jobnet]

  # ── Monitoring ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks: [jobnet]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on: [prometheus]
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes: [grafana_data:/var/lib/grafana]
    networks: [jobnet]