server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redis_pass}


  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            exposedHeaders: [Authorization]

      routes:
        - id: user-auth-service
          uri: ${USER_AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-auth-cb
                fallbackUri: forward:/fallback

        - id: job-posting-service
          uri: ${JOB_POSTING_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/jobs/**
          filters:
            - name: CircuitBreaker
              args:
                name: job-posting-cb
                fallbackUri: forward:/fallback

        - id: application-service
          uri: ${APPLICATION_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/applications/**
          filters:
            - name: CircuitBreaker
              args:
                name: application-cb
                fallbackUri: forward:/fallback

        - id: notification-service
          uri: ${NOTIFICATION_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification-cb
                fallbackUri: forward:/fallback

        - id: resume-service
          uri: ${RESUME_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/resumes/**
          filters:
            - name: CircuitBreaker
              args:
                name: resume-cb
                fallbackUri: forward:/fallback

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      user-auth-cb:     { baseConfig: default }
      job-posting-cb:   { baseConfig: default }
      notification-cb:   { baseConfig: default }
      application-cb:   { baseConfig: default }
      resume-cb:        { baseConfig: default }


jwt:
  secret: ${JWT_SECRET:my-super-secret-key-must-be-at-least-32-chars}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"