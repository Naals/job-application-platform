global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: jobplatform-prod

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway-service:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: api-gateway

  - job_name: user-auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-auth-service:8081']

  - job_name: job-posting-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['job-posting-service:8082']

  - job_name: application-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['application-service:8083']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8084']

  - job_name: resume-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['resume-service:8085']

  - job_name: kafka
    static_configs:
      - targets: ['kafka-service:7071']

  - job_name: elasticsearch
    metrics_path: /_prometheus/metrics
    static_configs:
      - targets: ['elasticsearch-service:9200']