replicaCount: 1
image:
  repository: ghcr.io/naals/job-platform/notification-service
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 8084
ingress:
  enabled: false
resources:
  requests: { memory: "256Mi", cpu: "100m" }
  limits:   { memory: "512Mi", cpu: "300m" }
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  cpuThreshold: 70
  memoryThreshold: 80
env:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"
  USER_AUTH_SERVICE_URL: "http://user-auth-service:8081"
  ZIPKIN_BASE_URL: "http://zipkin:9411"
  SERVER_PORT: "8084"
probes:
  liveness:  { path: /actuator/health/liveness,  initialDelaySeconds: 60, periodSeconds: 15 }
  readiness: { path: /actuator/health/readiness, initialDelaySeconds: 30, periodSeconds: 10 }