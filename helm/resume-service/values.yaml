replicaCount: 1

image:
  repository: ghcr.io/naals/job-platform/resume-service
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8085

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "500m"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  cpuThreshold: 70
  memoryThreshold: 80

env:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-jobs-service:5432/jobs_db"
  MINIO_ENDPOINT: "http://minio-service:9000"
  MINIO_BUCKET: "resumes"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  ZIPKIN_BASE_URL: "http://zipkin:9411"
  SERVER_PORT: "8085"

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15

  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10