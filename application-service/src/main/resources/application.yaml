server:
  port: 8083

spring:
  application:
    name: application-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/jobs_db}
    username: ${SPRING_DATASOURCE_USERNAME:jobs_user}
    password: ${SPRING_DATASOURCE_PASSWORD:jobs_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: applications

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: applications

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redis_pass}

  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 min

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Feign client targets
job-posting-service:
  url: ${JOB_POSTING_URI:http://localhost:8082}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50             # open after 50% failures
        slowCallRateThreshold: 80            # also open if 80% calls are slow
        slowCallDurationThreshold: 3000ms
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      job-posting-service:
        baseConfig: default
      user-auth-service:
        baseConfig: default
        waitDurationInOpenState: 10s         # faster recovery for auth

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - feign.RetryableException
    instances:
      job-posting-service:
        baseConfig: default
      user-auth-service:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 4s
        cancelRunningFuture: true
    instances:
      job-posting-service:
        baseConfig: default
      user-auth-service:
        baseConfig: default

feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 4000
        loggerLevel: BASIC

management:
  health:
    redis:
      enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  tracing:
    sampling:
      probability: 1.0


logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"