apiVersion: v1
kind: ConfigMap
metadata:
  name: common-config
  namespace: jobplatform
data:
  REDIS_HOST: "redis-service"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  ZIPKIN_BASE_URL: "http://zipkin-service:9411"
  PLATFORM_URL: "https://jobplatform.com"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-auth-config
  namespace: jobplatform
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-auth-service:5432/auth_db"
  SERVER_PORT: "8081"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: job-posting-config
  namespace: jobplatform
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-jobs-service:5432/jobs_db"
  SPRING_ELASTICSEARCH_URIS: "http://elasticsearch-service:9200"
  SERVER_PORT: "8082"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: application-config
  namespace: jobplatform
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-jobs-service:5432/jobs_db"
  JOB_POSTING_SERVICE_URL: "http://job-posting-service:8082"
  SERVER_PORT: "8083"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: jobplatform
data:
  SERVER_PORT: "8084"
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-config
  namespace: jobplatform
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-jobs-service:5432/jobs_db"
  MINIO_ENDPOINT: "http://minio-service:9000"
  MINIO_BUCKET: "resumes"
  SERVER_PORT: "8085"