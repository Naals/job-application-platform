name: CI — Build, Test, Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build + Test all modules
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build + run tests
        run: mvn clean verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_pass
          SPRING_REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-at-least-32-chars-long

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Check coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          for report in $(find . -path "*/target/site/jacoco/jacoco.xml" -not -path "*/api-gateway/*"); do
            MODULE=$(echo $report | cut -d/ -f2)
            MISSED=$(grep -oP 'type="LINE".*?missed="\K[0-9]+' $report | head -1)
            COVERED=$(grep -oP 'type="LINE".*?covered="\K[0-9]+' $report | head -1)
            if [ -n "$MISSED" ] && [ -n "$COVERED" ]; then
              TOTAL=$((MISSED + COVERED))
              if [ $TOTAL -gt 0 ]; then
                PCT=$(echo "scale=0; $COVERED * 100 / $TOTAL" | bc)
                echo "$MODULE coverage: $PCT%"
                if [ $PCT -lt 60 ]; then
                  echo "FAIL: $MODULE coverage $PCT% is below 60% threshold"
                  exit 1
                fi
              fi
            fi
          done
          echo "All modules passed coverage threshold"